services:
  proxy-api:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_PATH: /data
      STATE_BACKEND: file
      MQTT_URL: mqtt://mqtt-broker:1883
    ports:
      - "8000:8000"
    volumes:
      - proxy_state:/data
    depends_on:
      mqtt-broker:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mqtt-broker:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

volumes:
  proxy_state:
  mqtt_data:
  mqtt_log:
